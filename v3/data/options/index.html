<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Options Page :: Single Window</title>
  <link rel="stylesheet" type="text/css" href="index.css">
</head>

<body>
  <div id="content">
    <label for="check-type"><a data-href="faq7" target="about_blank">Check the type of the newly opened tab</a></label>
    <input type="checkbox" id="check-type">
    <label for="popup">When the new window is a popup</label>
    <select id="popup">
      <option value="create">Delete it and create a standard browser tab instead</option>
      <option value="move">Move it like standard browser tab</option>
      <option value="move-alt">Move it like standard browser tab (without activating)</option>
      <option value="circulate">First move it to a standard browser window</option>
      <option value="skip">Do nothing</option>
    </select>
    <label for="excluded-hosts">Excluded Hosts(One host per line)</label>
    <textarea id="excluded-hosts" rows="5" placeholder="google.com&#10;yahoo.com&#10;example.com">
    </textarea>
    <label for="opening-type">When switching a window to tab</label>
    <select id="opening-type">
      <option value="foreground">Make it Active</option>
      <option value="background">Keep it in Background</option>
    </select>
  </div>
  <p class="note">Moving a 'popup' tab to a regular window in Chromium-based browsers can cause the browser to crash.</p>

  <p>
    <input type="button" value="Factory Reset" id="reset">
    <input type="button" value="Support Development" id="support">
  </p>
  <p>
    <input type="button" value="Save Options" id="save">
    <span id="toast"></span>
  </p>

  <script src="index.js"></script>
</body>

</html>
